name: Android CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: android-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect-content-sensitive-changes:
    name: Detect content-sensitive changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      content_sensitive: ${{ steps.filter.outputs.content_sensitive }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect content-sensitive paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            content_sensitive:
              - 'app/build.gradle.kts'
              - 'app/src/main/AndroidManifest.xml'
              - 'app/src/main/res/xml/**'
              - 'app/src/main/java/io/github/velyene/loreweaver/domain/util/*Reference*.kt'
              - 'app/src/main/java/io/github/velyene/loreweaver/domain/util/MonsterReference*.kt'
              - 'app/src/main/java/io/github/velyene/loreweaver/domain/util/ObjectStats.kt'
              - 'app/src/main/java/io/github/velyene/loreweaver/domain/util/MadnessReference.kt'
              - 'app/src/main/java/io/github/velyene/loreweaver/domain/util/EncounterDifficulty.kt'
              - 'app/src/test/java/io/github/velyene/loreweaver/domain/util/ContentSafetyAudit*.kt'
              - 'app/src/test/java/io/github/velyene/loreweaver/domain/util/GameplayToolboxSrdAuditTest.kt'
              - 'app/src/test/java/io/github/velyene/loreweaver/domain/util/MagicItemsSrdAuditTest.kt'
              - 'app/src/test/java/io/github/velyene/loreweaver/domain/util/ReleaseBuildPolicyAuditTest.kt'
              - 'app/src/test/java/io/github/velyene/loreweaver/domain/util/BackupPolicyAuditTest.kt'
              - 'README.md'
              - 'NOTICE'
              - 'SRD_NOTICE.md'
              - 'legal_sources/**'
              - 'quarantine_do_not_ship/**'
              - 'HARD_DO_NOT_SHIP_AUDIT.md'
              - 'SRD_*_AUDIT.md'
              - 'EXCLUDED_REFERENCE_CORPUS_AUDIT.md'

  build-and-unit-test:
    name: Assemble debug + JVM unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Ensure Gradle wrapper is executable
        run: chmod +x ./gradlew

      - name: Assemble debug build
        run: ./gradlew :app:assembleDebug --console=plain

      - name: Run JVM unit tests
        run: ./gradlew :app:testDebugUnitTest --console=plain

  lint:
    name: Lint debug build
    runs-on: ubuntu-latest
    needs: build-and-unit-test
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Ensure Gradle wrapper is executable
        run: chmod +x ./gradlew

      - name: Run lint
        run: ./gradlew :app:lintDebug --console=plain

  content-audits:
    name: Content-sensitive audit tests
    runs-on: ubuntu-latest
    needs:
      - detect-content-sensitive-changes
      - build-and-unit-test
    if: needs.detect-content-sensitive-changes.outputs.content_sensitive == 'true'
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Ensure Gradle wrapper is executable
        run: chmod +x ./gradlew

      - name: Run audit tests for content-sensitive changes
        run: >-
          ./gradlew :app:testDebugUnitTest --console=plain
          --tests "io.github.velyene.loreweaver.domain.util.ContentSafetyAuditTest"
          --tests "io.github.velyene.loreweaver.domain.util.GameplayToolboxSrdAuditTest"
          --tests "io.github.velyene.loreweaver.domain.util.MagicItemsSrdAuditTest"
          --tests "io.github.velyene.loreweaver.domain.util.ReleaseBuildPolicyAuditTest"
          --tests "io.github.velyene.loreweaver.domain.util.BackupPolicyAuditTest"

