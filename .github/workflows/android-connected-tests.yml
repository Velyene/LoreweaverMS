name: Android Connected Tests

on:
  workflow_dispatch:
    inputs:
      api-level:
        description: Android API level for the emulator
        required: true
        default: '35'
        type: string
      target:
        description: System image target
        required: true
        default: google_apis
        type: choice
        options:
          - google_apis
          - default
      arch:
        description: Emulator CPU architecture
        required: true
        default: x86_64
        type: choice
        options:
          - x86_64
          - arm64-v8a
      profile:
        description: Emulator hardware profile
        required: true
        default: pixel_6
        type: string
      gradle-task:
        description: Gradle instrumentation task to run
        required: true
        default: ':app:connectedDebugAndroidTest'
        type: string
      test-class:
        description: Optional fully-qualified instrumentation test class to target
        required: false
        default: ''
        type: string

permissions:
  contents: read

concurrency:
  group: android-connected-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  connected-tests:
    name: Connected tests (API ${{ inputs.api-level }})
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Ensure Gradle wrapper is executable
        run: chmod +x ./gradlew

      - name: Build debug Android test artifacts
        run: ./gradlew :app:assembleDebug :app:assembleDebugAndroidTest --console=plain

      - name: Run connected Android tests
        uses: ReactiveCircus/android-emulator-runner@v2
        with:
          api-level: ${{ inputs.api-level }}
          target: ${{ inputs.target }}
          arch: ${{ inputs.arch }}
          profile: ${{ inputs.profile }}
          emulator-options: >-
            -no-snapshot-save
            -no-window
            -gpu swiftshader_indirect
            -noaudio
            -no-boot-anim
          disable-animations: true
          script: |
            if [ -n "${{ inputs.test-class }}" ]; then
              ./gradlew ${{ inputs.gradle-task }} --console=plain --tests "${{ inputs.test-class }}"
            else
              ./gradlew ${{ inputs.gradle-task }} --console=plain
            fi

